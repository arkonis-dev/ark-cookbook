# Configuration secret for this example.
#
# Uses the operator's Ollama settings injected via agentExtraEnv in the Helm chart.
# No API key needed — Ollama accepts any non-empty string.
#
# If you run Ollama in-cluster (e.g. ollama.ollama.svc.cluster.local), update
# OPENAI_BASE_URL accordingly.
#
# Apply:
#   kubectl apply -f secret.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: ark-api-keys
  namespace: ark-teams
stringData:
  OPENAI_API_KEY: "ollama"
  OPENAI_BASE_URL: "http://host.docker.internal:11434/v1"
