# 09-cron-discord - Daily Hacker News Digest → Discord
#
# A cron event fires every morning and runs a 3-step pipeline:
#   fetcher   → calls the HN Algolia API to retrieve today's top 5 stories
#   formatter → turns raw JSON into a clean Discord-ready Markdown digest
#   poster    → POSTs the digest to a Discord webhook
#
# Features demonstrated:
#   - ArkEvent with cron source (fires on a daily schedule)
#   - Inline HTTP tools on roles (no MCP server needed for simple API calls)
#   - {{ .steps.<role>.output }} passing output between pipeline steps
#   - validate: contains - formatter must produce the 📰 header or the run fails
#   - concurrencyPolicy: Forbid - skip if previous day's run is still going
#
# Prerequisites:
#   1. Create a Discord webhook in your server:
#        Server Settings → Integrations → Webhooks → New Webhook → Copy URL
#   2. Replace DISCORD_WEBHOOK_URL below with your webhook URL, or move it
#      to a Kubernetes Secret and reference it via spec.roles[].tools[].headers.
#
# Apply:
#   kubectl apply -f secret.yaml
#   kubectl apply -f hn-digest.yaml
#
# The cron fires at 08:00 UTC daily. To trigger immediately for testing:
#   ark trigger hn-digest-team -n ark-teams
#
apiVersion: arkonis.dev/v1alpha1
kind: ArkTeam
metadata:
  name: hn-digest-team
  namespace: ark-teams
spec:
  timeoutSeconds: 120

  roles:
    # Fetcher: calls the HN Algolia API and returns raw JSON.
    - name: fetcher
      model: qwen2.5:7b
      envFrom:
        - secretRef:
            name: ark-api-keys
      systemPrompt: |
        You are a data fetcher agent. Your only job:
        1. Call the fetch_hn_stories tool (no arguments needed).
        2. Output the raw JSON result exactly as returned - do not summarize or change it.
        Do not add any commentary.
      limits:
        maxTokensPerCall: 1000
        timeoutSeconds: 30

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      tools:
        - name: fetch_hn_stories
          description: "Returns the top 5 Hacker News front-page stories as JSON (title, url, points)."
          url: "https://hn.algolia.com/api/v1/search?tags=front_page&hitsPerPage=5&attributesToRetrieve=title,url,points"
          method: GET
          inputSchema: |
            {"type": "object", "properties": {}}

    # Formatter: converts raw JSON into a Discord-ready Markdown digest.
    - name: formatter
      model: qwen2.5:7b
      envFrom:
        - secretRef:
            name: ark-api-keys
      systemPrompt: |
        You are a text formatter. You receive raw Hacker News JSON data.
        Extract the top 5 stories and output them in this EXACT format:

        📰 **Top HN Stories**

        1. **<title>** - <points> pts
           <url>
        2. **<title>** - <points> pts
           <url>
        (continue for all 5 stories)

        IMPORTANT: Copy URLs exactly as they appear in the input. Do not use
        markdown link syntax [text](url) - paste the raw URL on its own line.
      limits:
        maxTokensPerCall: 600
        timeoutSeconds: 30

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    # Poster: POSTs the formatted digest to the Discord webhook.
    - name: poster
      model: qwen2.5:7b
      envFrom:
        - secretRef:
            name: ark-api-keys
      systemPrompt: |
        You are a Discord bot. You receive a formatted message and MUST post it to Discord.
        Call the post_to_discord tool with the message as the "content" field.
        After calling the tool, respond with: "Posted."
      limits:
        maxTokensPerCall: 400
        timeoutSeconds: 30

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      tools:
        - name: post_to_discord
          description: "Posts a message to the Discord channel."
          # Replace with your Discord webhook URL.
          # To avoid hardcoding credentials, move the URL to a Kubernetes Secret
          # and reference it via spec.roles[].tools[].headers with secretKeyRef.
          url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
          method: POST
          inputSchema: |
            {
              "type": "object",
              "properties": {
                "content": {
                  "type": "string",
                  "description": "The message to post to Discord (max 1800 characters)."
                }
              },
              "required": ["content"]
            }

  pipeline:
    # Note: step name = role name. Reference outputs via {{ .steps.<roleName>.output }}.

    - role: fetcher
      inputs:
        prompt: "Fetch the top Hacker News stories."

    - role: formatter
      dependsOn: [fetcher]
      inputs:
        prompt: |
          Format these Hacker News stories for Discord:
          {{ .steps.fetcher.output }}
      validate:
        contains: "📰"   # must contain the digest header; fail fast if formatter goes off-script
        onFailure: fail

    - role: poster
      dependsOn: [formatter]
      inputs:
        prompt: |
          Post this message to Discord:
          {{ .steps.formatter.output }}

  output: "{{ .steps.poster.output }}"
---
# ArkEvent - fires the digest pipeline every morning at 08:00 UTC.
apiVersion: arkonis.dev/v1alpha1
kind: ArkEvent
metadata:
  name: hn-digest-cron
  namespace: ark-teams
spec:
  source:
    type: cron
    cron: "0 8 * * *"   # 08:00 UTC daily
  targets:
    - team: hn-digest-team
  # Skip if the previous run is still in progress (shouldn't happen, but safe default).
  concurrencyPolicy: Forbid
  suspended: false
