# API keys for this example.
#
# This example uses Anthropic Claude models.
# Replace the placeholder value with your actual API key.
#
# Apply:
#   kubectl apply -f secret.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: ark-api-keys
  namespace: ark-teams
stringData:
  ANTHROPIC_API_KEY: sk-ant-replace-with-your-key
