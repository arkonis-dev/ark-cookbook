# 10-registry-routing - Dynamic Capability Routing
#
# Demonstrates RFC-0001: ArkRegistry + registryLookup on pipeline steps.
#
# Instead of hard-coding an agent role, a pipeline step declares the *capability*
# it needs. The operator resolves the best available agent at run time via the
# ArkRegistry index.
#
# Features demonstrated:
#   - ArkRegistry (namespace-scoped, maxDepth=2)
#   - capabilities on ArkAgent (id, description, tags)
#   - registryLookup on a pipeline step (capability, tags, strategy, fallback)
#   - Mixed steps: one static role + two resolved-via-registry steps
#
# Apply:
#   kubectl apply -f secret.yaml
#   kubectl apply -f capability-routing.yaml
#
# Trigger:
#   ark trigger content-team -n ark-teams \
#     --input '{"topic":"AI safety","audience":"researchers"}'

---
# ArkRegistry - one per namespace is typical.
# The controller auto-discovers all ArkAgents and rebuilds the index on any change.
apiVersion: arkonis.dev/v1alpha1
kind: ArkRegistry
metadata:
  name: default-registry
  namespace: ark-teams
spec:
  scope: namespace-scoped
  policy:
    maxDepth: 2          # max re-delegation hops before hard failure
    allowCrossTeam: false

---
# A general-purpose researcher that can do both web and academic searches.
apiVersion: arkonis.dev/v1alpha1
kind: ArkAgent
metadata:
  name: general-researcher
  namespace: ark-teams
spec:
  replicas: 2
  model: qwen2.5:7b
  envFrom:
    - secretRef:
        name: ark-api-keys
  systemPrompt: |
    You are a versatile research agent. Gather information accurately and concisely.
    Always cite your sources and flag low-confidence findings.
  limits:
    maxTokensPerCall: 8000
    timeoutSeconds: 120
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  capabilities:
    - id: research.web
      description: Research a topic using web sources
      tags: [web, general]
    - id: research.academic
      description: Research using academic and scientific sources
      tags: [academic, science]

---
# A specialist with deep scientific knowledge - preferred for academic queries.
apiVersion: arkonis.dev/v1alpha1
kind: ArkAgent
metadata:
  name: science-researcher
  namespace: ark-teams
spec:
  replicas: 1
  model: qwen2.5:7b
  envFrom:
    - secretRef:
        name: ark-api-keys
  systemPrompt: |
    You are a scientific research specialist. Focus on peer-reviewed sources.
    Always include methodology, confidence levels, and known limitations.
  limits:
    maxTokensPerCall: 12000
    timeoutSeconds: 180
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  capabilities:
    - id: research.academic
      description: Deep scientific research with methodology analysis
      tags: [academic, science, deep]

---
# A writer that produces structured long-form content.
apiVersion: arkonis.dev/v1alpha1
kind: ArkAgent
metadata:
  name: content-writer
  namespace: ark-teams
spec:
  replicas: 3
  model: qwen2.5:7b
  envFrom:
    - secretRef:
        name: ark-api-keys
  systemPrompt: |
    You are an expert content writer. Write clear, engaging articles for the specified audience.
    Use the research provided as your primary source of truth.
  limits:
    maxTokensPerCall: 10000
    timeoutSeconds: 150
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  capabilities:
    - id: write.article
      description: Write a long-form article for a given audience
      tags: [article, longform]
    - id: write.summary
      description: Write a short executive summary
      tags: [summary, short]

---
# ArkTeam using registryLookup for dynamic agent resolution.
apiVersion: arkonis.dev/v1alpha1
kind: ArkTeam
metadata:
  name: content-team
  namespace: ark-teams
spec:
  timeoutSeconds: 600

  inputs:
    - name: topic
      type: string
      description: "The topic to research and write about."
      required: true
    - name: audience
      type: string
      description: "Target audience for the article."
      required: false
      default: "general readers"

  roles:
    # Static role: editor is always a specific, fixed agent.
    - name: editor
      model: qwen2.5:7b
      envFrom:
        - secretRef:
            name: ark-api-keys
      systemPrompt: |
        You are a copy editor. Polish grammar and flow. Return the improved text only.
      limits:
        maxTokensPerCall: 4000
        timeoutSeconds: 60

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

  pipeline:
    # Step 1: resolve whichever agent has the research.academic capability at run time.
    # Prefers agents tagged "deep"; falls back to general-researcher if none match.
    - role: researcher
      registryLookup:
        capability: research.academic
        tags: [deep]
        strategy: least-busy
        fallback: general-researcher
      inputs:
        prompt: |
          Research the following topic for {{ .input.audience }}: {{ .input.topic }}
          Focus on key facts, recent developments, and relevant data points.

    # Step 2: resolve whichever agent can write a long-form article.
    # Uses round-robin to spread load across multiple writer instances.
    - role: writer
      dependsOn: [researcher]
      registryLookup:
        capability: write.article
        tags: [article]
        strategy: round-robin
      inputs:
        prompt: |
          Write a clear, engaging article about "{{ .input.topic }}" for {{ .input.audience }}.
          Base it on this research:

          {{ .steps.researcher.output }}

    # Step 3: static role - editor is always the same agent.
    - role: editor
      dependsOn: [writer]
      inputs:
        prompt: |
          Polish this article for {{ .input.audience }}. Fix grammar, improve flow.
          Return only the final text.

          {{ .steps.writer.output }}

  output: "{{ .steps.editor.output }}"
