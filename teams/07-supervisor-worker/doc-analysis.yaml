# 07-supervisor-worker - Document Analysis with Supervisor + Concurrent Workers
#
# A supervisor agent breaks a large document into sections and dispatches
# each section as an independent sub-task to worker agents via the built-in
# submit_subtask tool. Workers run concurrently (replicas > 1). When all
# workers finish, the supervisor synthesizes the results into a final report.
#
# This is the horizontal scale pattern: instead of one agent processing a
# 100-page document serially, workers process sections in parallel.
#
# Features demonstrated:
#   - submit_subtask built-in tool (supervisor/worker delegation)
#   - replicas > 1 on worker role (concurrent processing)
#   - AGENT_MAX_CONCURRENT_TASKS (per-pod parallelism)
#   - ArkService with least-busy routing (tasks go to the least loaded worker)
#   - Dynamic mode: supervisor decides the work split at runtime
#   - Per-role queue isolation (supervisor and workers have separate queues)
#
# Apply:
#   kubectl apply -f secret.yaml
#   kubectl apply -f doc-analysis.yaml
#
# Submit a document for analysis via the entry ArkService:
#   curl -X POST http://<entry-service-ip>:8081/task \
#     -H "Content-Type: application/json" \
#     -d '{
#       "prompt": "Analyze this contract: <paste document text here>",
#       "meta": {"documentId": "contract-2026-001", "type": "legal"}
#     }'
#
apiVersion: arkonis.dev/v1alpha1
kind: ArkTeam
metadata:
  name: doc-analysis-team
  namespace: ark-teams
spec:
  entry: supervisor

  roles:
    # Supervisor - receives the full document, splits it into sections,
    # dispatches each section to a worker via submit_subtask, then
    # synthesizes all worker results into a final analysis report.
    - name: supervisor
      model: qwen2.5:7b
      envFrom:
        - secretRef:
            name: ark-api-keys
      systemPrompt: |
        You are a document analysis supervisor. When you receive a document:

        1. Split it into logical sections (max ~500 words each).
        2. For each section, call submit_subtask with:
           - role: "analyzer"
           - prompt: the section text plus the document type for context
        3. Collect all subtask results. The submit_subtask tool returns the result
           synchronously after the worker completes.
        4. Synthesize all section analyses into a comprehensive final report
           covering: key themes, risks, obligations, recommendations, and a
           confidence score for each finding.

        Return the final report as structured JSON.

        Document types and what to look for:
        - legal: obligations, liability, jurisdiction, termination clauses
        - financial: figures, projections, risks, assumptions
        - technical: architecture decisions, risks, dependencies, gaps
        - general: main claims, evidence, conclusions
      canDelegate:
        - analyzer
      limits:
        maxTokensPerCall: 16000   # Needs large context to hold the full synthesis
        timeoutSeconds: 600

      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      replicas: 1

    # Analyzer - processes one document section at a time.
    # Multiple replicas allow concurrent section analysis.
    # AGENT_MAX_CONCURRENT_TASKS=3 means each pod handles 3 sections in parallel.
    - name: analyzer
      model: qwen2.5:7b
      envFrom:
        - secretRef:
            name: ark-api-keys
      systemPrompt: |
        You are a document section analysis specialist. You receive one section
        of a larger document. Analyze it for:
        - Key claims or statements
        - Obligations, commitments, or requirements
        - Risks or red flags
        - Important figures, dates, or entities

        Return structured JSON: {
          "summary": "...",
          "keyPoints": [...],
          "risks": [...],
          "entities": [...],
          "confidence": 0.0-1.0
        }
      limits:
        maxTokensPerCall: 4000
        maxConcurrentTasks: 3   # Each pod handles 3 sections concurrently
        timeoutSeconds: 90

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      replicas: 5               # 5 pods × 3 concurrent = 15 sections in parallel
      autoscaling:
        enabled: true
        minReplicas: 2          # Keep 2 warm - supervisors shouldn't wait for cold start
        maxReplicas: 20         # Burst for very large documents
        targetPendingTasks: 5   # Scale up when queue builds
---
# ArkService for the section-analyzer workers.
# least-busy routing ensures tasks go to the pod with the most available capacity.
apiVersion: arkonis.dev/v1alpha1
kind: ArkService
metadata:
  name: doc-analysis-workers
  namespace: ark-teams
spec:
  selector:
    arkAgent: doc-analysis-team-analyzer
  routing:
    strategy: least-busy
  ports:
    - protocol: A2A
      port: 8080
