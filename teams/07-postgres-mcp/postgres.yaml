# Postgres deployment with seed data.
#
# Deployed in the ark-infra namespace (baseline PodSecurity) because the
# official postgres image runs as root during init. The MCP server in
# ark-teams connects via cross-namespace DNS:
#   postgres.ark-infra.svc.cluster.local:5432
#
# The init ConfigMap creates three tables and inserts rows with real security
# issues baked in so the auditor agent has genuine findings to report.
#
# Apply:
#   kubectl apply -f secret.yaml
#   kubectl apply -f postgres.yaml
#   kubectl wait --for=condition=ready pod -l app=postgres -n ark-infra --timeout=60s
---
apiVersion: v1
kind: Namespace
metadata:
  name: ark-infra
  labels:
    # baseline allows root containers; postgres needs it during startup.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: ark-infra
data:
  init.sql: |
    CREATE TABLE users (
        id                    SERIAL PRIMARY KEY,
        email                 VARCHAR(255) NOT NULL UNIQUE,
        role                  VARCHAR(50)  NOT NULL DEFAULT 'user',
        created_at            TIMESTAMP    NOT NULL DEFAULT NOW(),
        last_login            TIMESTAMP,
        failed_login_attempts INT          NOT NULL DEFAULT 0,
        is_active             BOOLEAN      NOT NULL DEFAULT true
    );

    CREATE TABLE orders (
        id         SERIAL PRIMARY KEY,
        user_id    INT            NOT NULL REFERENCES users(id),
        amount     DECIMAL(10,2)  NOT NULL,
        status     VARCHAR(50)    NOT NULL DEFAULT 'pending',
        created_at TIMESTAMP      NOT NULL DEFAULT NOW()
    );

    CREATE TABLE api_keys (
        id          SERIAL PRIMARY KEY,
        user_id     INT          NOT NULL REFERENCES users(id),
        key_hash    VARCHAR(64)  NOT NULL,
        permissions TEXT[]       NOT NULL DEFAULT '{}',
        created_at  TIMESTAMP    NOT NULL DEFAULT NOW(),
        expires_at  TIMESTAMP,
        last_used   TIMESTAMP
    );

    -- -----------------------------------------------------------------------
    -- Users — several with security issues
    -- -----------------------------------------------------------------------
    INSERT INTO users (email, role, created_at, last_login, failed_login_attempts, is_active) VALUES
      -- dormant admin: privileged account, no login in 8 months
      ('alice@corp.com',   'admin',      NOW() - INTERVAL '1 year',   NOW() - INTERVAL '8 months', 0,  true),
      -- brute-force target: 14 consecutive failed logins
      ('bob@corp.com',     'user',       NOW() - INTERVAL '6 months', NOW() - INTERVAL '2 hours',  14, true),
      -- normal active user
      ('charlie@corp.com', 'user',       NOW() - INTERVAL '3 months', NOW() - INTERVAL '1 day',    0,  true),
      -- active admin (healthy baseline)
      ('diana@corp.com',   'admin',      NOW() - INTERVAL '2 years',  NOW() - INTERVAL '1 hour',   0,  true),
      -- ghost user: account created, never logged in, but has a large order
      ('eve@corp.com',     'user',       NOW() - INTERVAL '4 months', NULL,                        0,  true),
      -- disabled user with recent failed attempts
      ('frank@corp.com',   'user',       NOW() - INTERVAL '2 years',  NOW() - INTERVAL '35 days',  2,  false),
      -- superadmin: highest privilege, should be scrutinised
      ('grace@corp.com',   'superadmin', NOW() - INTERVAL '1 year',   NOW() - INTERVAL '6 hours',  0,  true),
      -- normal recent signup
      ('henry@corp.com',   'user',       NOW() - INTERVAL '1 month',  NOW() - INTERVAL '5 minutes',0,  true);

    -- -----------------------------------------------------------------------
    -- Orders — includes suspicious entries
    -- -----------------------------------------------------------------------
    INSERT INTO orders (user_id, amount, status, created_at) VALUES
      (3, 150.00,   'completed', NOW() - INTERVAL '10 days'),
      (3, 2500.00,  'completed', NOW() - INTERVAL '5 days'),
      (8, 99.99,    'pending',   NOW() - INTERVAL '1 hour'),
      -- ghost account (eve, never logged in) placing a $15,000 order
      (5, 15000.00, 'pending',   NOW() - INTERVAL '2 days'),
      (2, 450.00,   'failed',    NOW() - INTERVAL '3 days'),
      (4, 750.00,   'completed', NOW() - INTERVAL '1 day'),
      -- dormant admin (alice) placed a large order 7 months ago
      (1, 9999.99,  'completed', NOW() - INTERVAL '7 months'),
      (7, 3200.00,  'pending',   NOW() - INTERVAL '4 hours');

    -- -----------------------------------------------------------------------
    -- API keys — several with security issues
    -- -----------------------------------------------------------------------
    INSERT INTO api_keys (user_id, key_hash, permissions, created_at, expires_at, last_used) VALUES
      -- alice (dormant admin): admin-level key, no expiry, unused for 8 months
      (1, 'a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2',
       ARRAY['read','write','admin','delete'],
       NOW() - INTERVAL '1 year', NULL, NOW() - INTERVAL '8 months'),

      -- charlie: read-only key, expires in 30 days — healthy baseline
      (3, 'c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4',
       ARRAY['read'],
       NOW() - INTERVAL '3 months', NOW() + INTERVAL '30 days', NOW() - INTERVAL '1 day'),

      -- grace (superadmin): all permissions including superadmin, no expiry, active
      (7, 'g7h8i9j0k1l2g7h8i9j0k1l2g7h8i9j0k1l2g7h8i9j0k1l2g7h8i9j0k1l2g7h8',
       ARRAY['read','write','admin','delete','superadmin'],
       NOW() - INTERVAL '1 year', NULL, NOW() - INTERVAL '6 hours'),

      -- frank (disabled user): key expired 30 days ago, but last_used was 2 hours ago
      (6, 'f6g7h8i9j0k1f6g7h8i9j0k1f6g7h8i9j0k1f6g7h8i9j0k1f6g7h8i9j0k1f6g7',
       ARRAY['read','write'],
       NOW() - INTERVAL '1 year', NOW() - INTERVAL '30 days', NOW() - INTERVAL '2 hours');
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: ark-infra
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: appdb
            - name: POSTGRES_USER
              value: appuser
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "appuser", "-d", "appdb"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ark-infra
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
