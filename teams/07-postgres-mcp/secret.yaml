# secret.yaml — fill in values before applying.
#
# ark-api-keys:   Ollama endpoint (no API key needed for qwen2.5:7b).
#                 Replace OPENAI_BASE_URL with your Ollama address:
#                   Docker Desktop: http://host.docker.internal:11434/v1
#                   Linux host:     http://172.17.0.1:11434/v1
#
# postgres-secret: Postgres credentials shared by the DB pod and the MCP server.
#                  Change POSTGRES_PASSWORD to any password you like.
---
apiVersion: v1
kind: Secret
metadata:
  name: ark-api-keys
  namespace: ark-teams
type: Opaque
stringData:
  AGENT_PROVIDER: openai
  OPENAI_API_KEY: ollama
  OPENAI_BASE_URL: http://host.docker.internal:11434/v1
---
# postgres-secret in ark-infra: used by the postgres pod for POSTGRES_PASSWORD.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: ark-infra
type: Opaque
stringData:
  POSTGRES_PASSWORD: "changeme"
---
# postgres-secret in ark-teams: used by the postgres-mcp pod for DB_PASSWORD.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: ark-teams
type: Opaque
stringData:
  DB_PASSWORD: "changeme"
