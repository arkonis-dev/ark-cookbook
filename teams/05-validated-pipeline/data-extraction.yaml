# 05-validated-pipeline - Structured Data Extraction with Output Validation
#
# A three-step pipeline that extracts, enriches, and formats structured data
# from unstructured text. Every step has output validation - if a step's
# output doesn't meet the contract, it retries automatically before failing.
#
# The three validation modes are all demonstrated:
#   - contains: regex check that output is non-empty and well-formed
#   - schema:   JSON Schema enforcement on structured fields
#   - semantic: secondary LLM call verifying the output quality
#
# Features demonstrated:
#   - validate: block on pipeline steps (all three modes)
#   - validate.rejectPatterns: RE2 security gate - blocks prompt injection in cross-step data
#   - onFailure: retry with maxRetries
#   - validationAttempts tracked in ArkRun.status.steps[].validationAttempts
#   - outputSchema (JSON Schema) on each step
#   - Loop step (enricher retries until confidence threshold is met)
#   - loop.condition and loop.maxIterations
#   - spec.resources on every role (required to avoid webhook warnings)
#
# Apply:
#   kubectl apply -f secret.yaml
#   kubectl apply -f data-extraction.yaml
#
# Trigger:
#   ark trigger data-extraction-team -n ark-teams \
#     --input '{
#       "rawText": "John Smith, CTO at Acme Corp. Reached out on 2026-03-15 about enterprise pricing. Budget: $50k/year. Very interested in the Pro plan.",
#       "targetSchema": "contact"
#     }'
#
apiVersion: arkonis.dev/v1alpha1
kind: ArkTeam
metadata:
  name: data-extraction-team
  namespace: ark-teams
spec:
  timeoutSeconds: 300

  inputs:
    - name: rawText
      type: string
      description: "Unstructured text to extract data from."
      required: true
    - name: targetSchema
      type: string
      description: "The type of data to extract: contact | deal | event"
      required: false
      default: "contact"

  roles:
    - name: extractor
      model: deepseek-r1:14b
      envFrom:
        - secretRef:
            name: ark-api-keys
      systemPrompt: |
        You are a structured data extraction specialist. Given unstructured text,
        extract all available fields into a well-formed JSON object. Be precise -
        only include fields you can confidently extract. Do not hallucinate values.
        Always return valid JSON and nothing else.
      limits:
        maxTokensPerCall: 4000
        timeoutSeconds: 60
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    - name: enricher
      model: deepseek-r1:14b
      envFrom:
        - secretRef:
            name: ark-api-keys
      systemPrompt: |
        You are a data enrichment specialist. Given an extracted contact or deal record,
        add computed fields: infer intent, classify urgency, suggest next action, and
        add a confidence score (0.0–1.0) for the overall extraction quality.
        Return the enriched JSON object.
      limits:
        maxTokensPerCall: 4000
        timeoutSeconds: 60
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    - name: formatter
      model: deepseek-r1:14b
      envFrom:
        - secretRef:
            name: ark-api-keys
      systemPrompt: |
        You are a data formatter. Take the enriched JSON record and produce a clean,
        human-readable summary in Markdown - suitable for a CRM activity note.
        Include all key fields in a structured format.
      limits:
        maxTokensPerCall: 2000
        timeoutSeconds: 30
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

  pipeline:
    # Note: step name = role name. Reference outputs via {{ .steps.<roleName>.output }}.

    # Step 1 - Extract. Validates with regex + JSON Schema; retries on failure.
    - role: extractor
      inputs:
        prompt: |
          Extract a {{ .input.targetSchema }} record from this text.
          Return ONLY valid JSON. No explanation, no markdown fences.

          Text:
          {{ .input.rawText }}
      outputSchema: |
        {
          "type": "object",
          "properties": {
            "name":    { "type": "string" },
            "company": { "type": "string" },
            "email":   { "type": "string" },
            "date":    { "type": "string" }
          },
          "required": ["name"]
        }
      validate:
        # Mode 1 - regex: ensure output is a JSON object (starts with '{')
        contains: '^\s*\{'
        # Mode 2 - schema: enforce the required fields
        schema: |
          {
            "type": "object",
            "properties": {
              "name": { "type": "string", "minLength": 1 }
            },
            "required": ["name"]
          }
        onFailure: retry
        maxRetries: 3

    # Step 2 - Enrich. Loops until confidence >= 0.8; validates semantically.
    - role: enricher
      dependsOn: [extractor]
      inputs:
        prompt: |
          Enrich this extracted {{ .input.targetSchema }} record with computed fields.
          Add: intent, urgency (low/medium/high), nextAction, and confidence (0.0-1.0).

          Record:
          {{ .steps.extractor.output }}
      loop:
        condition: '{{ ge (index .steps.enricher.data "confidence" | float64) 0.8 }}'
        maxIterations: 3
      outputSchema: |
        {
          "type": "object",
          "properties": {
            "intent":     { "type": "string" },
            "urgency":    { "type": "string", "enum": ["low", "medium", "high"] },
            "nextAction": { "type": "string" },
            "confidence": { "type": "number", "minimum": 0, "maximum": 1 }
          },
          "required": ["intent", "urgency", "nextAction", "confidence"]
        }
      validate:
        # Security gate: block prompt injection hidden in the extractor's output.
        # These patterns catch common injection attempts before quality checks run.
        rejectPatterns:
          - '(?i)ignore\s+(all\s+)?previous\s+instructions'
          - '(?i)system\s+prompt'
          - '(?i)you\s+are\s+now'
          - '<\s*/?(?:script|iframe|img)[^>]*>'
        # Mode 2 - schema: ensure all enrichment fields are present
        schema: |
          {
            "type": "object",
            "required": ["intent", "urgency", "nextAction", "confidence"]
          }
        # Mode 3 - semantic: LLM checks that the enrichment makes sense
        semantic: |
          The following JSON is an enriched CRM record. Check that:
          1. The intent field describes a plausible business intent.
          2. The urgency level is appropriate given the context.
          3. The nextAction is a concrete, actionable step.
          Reply with exactly one word: VALID or INVALID.
        onFailure: retry
        maxRetries: 2

    # Step 3 - Format. Validates output contains a Markdown heading.
    - role: formatter
      dependsOn: [enricher]
      inputs:
        prompt: |
          Format this enriched {{ .input.targetSchema }} record as a CRM activity note in Markdown.
          Use headings, bold labels, and a clean layout.

          Record:
          {{ .steps.enricher.output }}
      validate:
        contains: '^#'
        onFailure: retry
        maxRetries: 2

  output: "{{ .steps.formatter.output }}"
