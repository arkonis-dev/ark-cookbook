# secret.yaml — fill in your Ollama endpoint before applying.
# This example uses qwen2.5:7b via Ollama (no API key required).
# Replace OPENAI_BASE_URL with your Ollama endpoint:
#   Docker Desktop: http://host.docker.internal:11434/v1
#   Linux host:     http://172.17.0.1:11434/v1
---
apiVersion: v1
kind: Secret
metadata:
  name: ark-api-keys
  namespace: ark-teams
type: Opaque
stringData:
  AGENT_PROVIDER: openai
  OPENAI_API_KEY: ollama
  OPENAI_BASE_URL: http://host.docker.internal:11434/v1
